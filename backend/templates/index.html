<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tribal Link — Multi-vendor e-commerce platform connecting tribal artisans with buyers. Authentic handcrafted products from India's indigenous communities.">
    <meta name="keywords" content="tribal products, handcrafted, artisan marketplace, indigenous crafts, tribal jewelry, India">
    <meta name="author" content="Tribal Link">
    <title>Tribal Link — Authentic Tribal Artisan Marketplace</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏺</text></svg>">

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- App Styles -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- ═══ NAVBAR ═══ -->
    <nav class="navbar" id="main-navbar">
        <div class="container">
            <a href="#home" class="navbar-brand" onclick="App.navigate('home')">
                <span class="logo-icon">🏺</span>
                <span>Tribal Link</span>
            </a>

            <div class="navbar-search">
                <input type="text" id="search-input" placeholder="Search products, categories..." autocomplete="off">
                <i class="fas fa-search search-icon"></i>
            </div>

            <button class="mobile-toggle" onclick="document.querySelector('.navbar-search').style.display=document.querySelector('.navbar-search').style.display==='block'?'none':'block'" aria-label="Toggle search">
                <i class="fas fa-search"></i>
            </button>

            <div class="navbar-actions" id="nav-actions">
                <button class="nav-btn" onclick="App.navigate('login')"><i class="fas fa-sign-in-alt"></i><span>Login</span></button>
                <button class="btn btn-primary btn-sm" onclick="App.navigate('register')">Sign Up</button>
            </div>
        </div>
    </nav>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main class="main-content" id="app-content">
        <div class="loading-spinner" style="padding: 200px 0">
            <div class="spinner"></div>
        </div>
    </main>

    <!-- ═══ TOAST CONTAINER ═══ -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ═══ SCRIPTS ═══ -->
    <script src="/static/js/api.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/pages.js"></script>
    <script src="/static/js/dashboards.js"></script>

</body>
</html>
